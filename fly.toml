# Change this if the Fly app name is already taken.
app = "aais-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  LLM_PROVIDER = "nvidia_nim"
  NVIDIA_NIM_BASE_URL = "https://integrate.api.nvidia.com/v1"
  NVIDIA_NIM_MODEL = "nvidia/nemotron-3-super-120b-a12b"
  LLM_TIMEOUT_SECONDS = "30"
  # Replace this with the Vercel production URL after the frontend project exists.
  AAIS_CORS_ORIGINS = "https://your-vercel-project.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/live"
